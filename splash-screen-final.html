an<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSH Hospital - Professional Splash</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            font-family: 'Raleway', sans-serif;
            margin: 0;
            padding: 0;
        }

        .splash-container {
            position: relative;
            width: 100%;
            max-width: 480px;
            height: 100vh;
            margin: 0 auto;
            background: #FDFCFF;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Animated Square - Lavender color with white background */
        .gradient-square {
            position: absolute;
            width: 96px;
            height: 96px;
            border-radius: 20px;
            background: #C8B6E2;
            animation: squareGrow 1.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            transform-origin: center;
            box-shadow: 0 0 40px rgba(200, 182, 226, 0.5);
        }

        /* Mobile-only square animation - optimized for 480px max */
        @keyframes squareGrow {
            0% {
                width: 96px;
                height: 96px;
                transform: translateY(300px) rotate(0deg);
                opacity: 1;
            }
            20% {
                transform: translateY(0px) rotate(0deg);
                opacity: 1;
            }
            35% {
                width: 204px;
                height: 204px;
                transform: rotate(15deg);
                opacity: 1;
            }
            50% {
                width: 45px;
                height: 45px;
                transform: translateX(80px) rotate(45deg);
                opacity: 1;
            }
            60% {
                width: 45px;
                height: 45px;
                transform: translateX(120px) rotate(90deg);
                opacity: 1;
            }
            80% {
                width: 800px;
                height: 800px;
                transform: translateX(-80px) translateY(-180px) rotate(135deg);
                opacity: 1;
            }
            100% {
                width: 800px;
                height: 800px;
                transform: translateX(-80px) translateY(-180px) rotate(135deg);
                opacity: 1;
            }
        }

        /* Logo container - moves to left and shrinks */
        .logo-wrapper {
            position: absolute;
            width: 160px;
            height: 160px;
            opacity: 0;
            z-index: 100;
            animation: logoJourney 2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            animation-delay: 1.2s;
            filter: drop-shadow(0 8px 25px rgba(255, 255, 255, 0.5));
        }

        .logo-wrapper svg {
            width: 100%;
            height: 100%;
        }

        .logo-wrapper svg path {
            fill: #FFFFFF;
        }

        /* Logo Animation: Appear center -> Move left & shrink - MOBILE OPTIMIZED */
        @keyframes logoJourney {
            0% {
                opacity: 0;
                transform: translate(0, -60px) scale(0.5);
            }
            25% {
                opacity: 1;
                transform: translate(0, -60px) scale(1.1);
            }
            45% {
                opacity: 1;
                transform: translate(0, -60px) scale(1);
            }
            100% {
                opacity: 1;
                transform: translate(calc(-50vw + 70px), -60px) scale(0.45);
            }
        }

        /* Hospital Name Text - MOBILE OPTIMIZED */
        .hospital-text {
            position: absolute;
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 700;
            color: #FFFFFF;
            opacity: 0;
            animation: textReveal 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            animation-delay: 2.5s;
            letter-spacing: 2.5px;
            z-index: 100;
            text-transform: uppercase;
            text-shadow: 0 4px 20px rgba(255, 255, 255, 0.3);
            left: 130px;
            top: calc(50% - 24px);
            transform-origin: left center;
        }

        @keyframes textReveal {
            0% {
                opacity: 0;
                transform: translateX(-40px);
                clip-path: inset(0 100% 0 0);
            }
            50% {
                opacity: 1;
                transform: translateX(0);
                clip-path: inset(0 0 0 0);
            }
            70% {
                opacity: 1;
                transform: translateX(0) scale(1.02);
            }
            100% {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
        }

        /* Tagline Text - HIDDEN */
        .tagline-text {
            display: none;
        }

        /* Loading Dot - FASTER */
        .loading-dot {
            position: absolute;
            width: 14px;
            height: 14px;
            background: #FFFFFF;
            border-radius: 50%;
            opacity: 0;
            animation: dotPulse 1.2s ease-in-out infinite;
            animation-delay: 4.2s;
            z-index: 100;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.6);
            top: calc(50% + 20px);
        }

        @keyframes dotPulse {
            0%, 10% {
                opacity: 0;
                transform: scale(0.8);
            }
            20% {
                opacity: 1;
                transform: scale(1);
            }
            40% {
                opacity: 0.6;
                transform: scale(1.3);
            }
            60% {
                opacity: 1;
                transform: scale(1);
            }
            80% {
                opacity: 0.6;
                transform: scale(1.3);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Decorative line that expands - MOBILE OPTIMIZED */
        .deco-line {
            position: absolute;
            width: 0;
            height: 3px;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(255, 255, 255, 0.8) 25%, 
                #FFFFFF 50%, 
                rgba(255, 255, 255, 0.8) 75%, 
                transparent 100%
            );
            top: calc(50% - 30px);
            opacity: 0;
            animation: lineExpand 1s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            animation-delay: 3.8s;
            box-shadow: 0 2px 15px rgba(255, 255, 255, 0.4);
            z-index: 100;
        }

        @keyframes lineExpand {
            0% {
                width: 0;
                opacity: 0;
            }
            20% {
                opacity: 1;
            }
            100% {
                width: 260px;
                opacity: 1;
            }
        }

        /* Fade to white - FASTER */
        .fade-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #FDFCFF;
            opacity: 0;
            animation: fadeToLight 0.6s ease-in-out forwards;
            animation-delay: 4.8s;
            z-index: 200;
            pointer-events: none;
        }

        @keyframes fadeToLight {
            0% {
                opacity: 0;
            }
            100% {
                opacity: 1;
            }
        }

        /* Floating particles */
        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: radial-gradient(circle, rgba(200, 182, 226, 0.6), transparent);
            border-radius: 50%;
            animation: floatUp 4s ease-in-out infinite;
            opacity: 0;
            z-index: 100;
        }

        .particle:nth-child(1) {
            left: 15%;
            top: 80%;
            animation-delay: 2s;
        }

        .particle:nth-child(2) {
            left: 85%;
            top: 75%;
            animation-delay: 2.4s;
        }

        .particle:nth-child(3) {
            left: 25%;
            top: 70%;
            animation-delay: 2.8s;
        }

        .particle:nth-child(4) {
            left: 75%;
            top: 85%;
            animation-delay: 3.2s;
        }

        @keyframes floatUp {
            0% {
                opacity: 0;
                transform: translateY(0);
            }
            50% {
                opacity: 0.6;
            }
            100% {
                opacity: 0;
                transform: translateY(-150px);
            }
        }

        /* Mobile-first responsive adjustments */
        @media (max-width: 390px) {
            .logo-wrapper {
                width: 140px;
                height: 140px;
            }

            .hospital-text {
                font-size: 24px;
                letter-spacing: 2px;
                left: 115px;
                top: calc(50% - 24px);
            }

            @keyframes lineExpand {
                100% {
                    width: 240px;
                }
            }
        }
    </style>
</head>
<body>

        <!-- Animated Gradient Square -->
        <div class="gradient-square"></div>
        
        <!-- Floating Particles -->
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>

        </div>
        
        <!-- Hospital Name -->
        <div class="hospital-text">MSH HOSPITAL</div>
        
        <!-- Decorative Line -->
        <div class="deco-line"></div>
        
        <!-- Tagline - Removed per user request -->
        
        <!-- Loading Dot -->
        <div class="loading-dot"></div>
        
        <!-- Fade Overlay -->
        <div class="fade-overlay"></div>
    </div>

    <script>
        // Optional: Restart animation on click
        document.querySelector('.splash-container').addEventListener('click', function() {
            location.reload();
        });

        // Auto-redirect after animation completes (faster)
        setTimeout(function() {
            console.log('MSH Hospital - Animation complete');
            // Uncomment the line below to redirect to your main page
            // window.location.href = 'index.html';
        }, 5400);
    </script>
</body>
</html>
