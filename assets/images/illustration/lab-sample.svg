<svg preserveAspectRatio="none" width="100%" height="100%" overflow="visible" style="display: block;" viewBox="0 0 100 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Lab Sample Collection - Clay Lavender Style -->
  
  <!-- Background test tube rack -->
  <rect x="20" y="55" width="60" height="8" rx="2" fill="#E0E0E0"/>
  <rect x="25" y="58" width="50" height="5" rx="1" fill="#EBEBEB"/>
  
  <!-- Test Tube 1 - Left -->
  <g id="test-tube-1">
    <rect x="28" y="20" width="10" height="40" rx="5" fill="#C8B6E2"/>
    <rect x="28" y="20" width="10" height="6" rx="2" fill="#8389BE"/>
    <rect x="30" y="35" width="6" height="18" rx="3" fill="#8389BE" opacity="0.6"/>
    <ellipse cx="33" cy="58" rx="5" ry="2" fill="#C8B6E2"/>
    <!-- Liquid highlight -->
    <path d="M30 38 L30 50 Q33 53 36 50 L36 38 Q33 36 30 38" fill="#A89BC9" opacity="0.4"/>
  </g>
  
  <!-- Test Tube 2 - Center (main focus) -->
  <g id="test-tube-2">
    <rect x="45" y="15" width="12" height="45" rx="6" fill="#F5F5F5"/>
    <rect x="45" y="15" width="12" height="8" rx="2" fill="#8389BE"/>
    <rect x="47" y="32" width="8" height="22" rx="4" fill="#C8B6E2"/>
    <ellipse cx="51" cy="58" rx="6" ry="2" fill="#E6E6E6"/>
    <!-- Liquid highlight -->
    <path d="M48 35 L48 50 Q51 54 54 50 L54 35 Q51 32 48 35" fill="#B8A8D9" opacity="0.5"/>
    <!-- Blood drop icon -->
    <path d="M51 38 Q54 42 51 46 Q48 42 51 38" fill="#D4A5A5" opacity="0.7"/>
  </g>
  
  <!-- Test Tube 3 - Right -->
  <g id="test-tube-3">
    <rect x="62" y="22" width="10" height="38" rx="5" fill="#E6E6E6"/>
    <rect x="62" y="22" width="10" height="6" rx="2" fill="#8389BE"/>
    <rect x="64" y="38" width="6" height="15" rx="3" fill="#C8B6E2" opacity="0.7"/>
    <ellipse cx="67" cy="58" rx="5" ry="2" fill="#E6E6E6"/>
    <!-- Liquid highlight -->
    <path d="M64 40 L64 50 Q67 52 70 50 L70 40 Q67 38 64 40" fill="#D6C8E8" opacity="0.4"/>
  </g>
  
  <!-- Sample Collection Vial (small) -->
  <g id="collection-vial">
    <rect x="12" y="38" width="8" height="20" rx="4" fill="#EBEBEB"/>
    <rect x="12" y="38" width="8" height="5" rx="1.5" fill="#8389BE"/>
    <rect x="13.5" y="48" width="5" height="6" rx="2.5" fill="#C8B6E2" opacity="0.6"/>
  </g>
  
  <!-- Dropper/Pipette -->
  <g id="pipette">
    <rect x="78" y="25" width="6" height="28" rx="3" fill="#F0F0F0"/>
    <rect x="78" y="25" width="6" height="10" rx="2" fill="#8389BE"/>
    <ellipse cx="81" y="35" rx="3" ry="1.5" fill="#A89BC9"/>
    <rect x="79.5" y="45" width="3" height="8" rx="1" fill="#E0E0E0"/>
    <!-- Liquid drop -->
    <circle cx="81" cy="56" r="2" fill="#C8B6E2" opacity="0.7"/>
  </g>
  
  <!-- Decorative elements - small bubbles -->
  <circle cx="33" cy="42" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="51" cy="40" r="2" fill="white" opacity="0.5"/>
  <circle cx="67" cy="45" r="1.5" fill="white" opacity="0.6"/>
  
  <!-- Shadow under rack -->
  <ellipse cx="50" cy="68" rx="35" ry="4" fill="black" opacity="0.08"/>
</svg>
