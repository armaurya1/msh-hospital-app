<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Personal Details</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>

            background-color: #fbf8ff;

            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "tertiary-fixed-dim": "#d3bcf7",

                        "on-background": "#1b1b21",
                        "surface-dim": "#dbd9e1",
                        "outline": "#7a7582",
                        "on-primary-fixed": "#24005a",
                        "primary": "#6547a4",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-fixed": "#ecdcff",
                        "on-surface-variant": "#494551",
                        "outline-variant": "#cbc4d3",
                        "surface-bright": "#fbf8ff",

                        "on-primary-fixed-variant": "#523391",
                        "secondary-fixed": "#eaddff",

                        "on-secondary": "#ffffff",
                        "secondary": "#635a76",

                        "inverse-surface": "#303036",
                        "on-secondary-fixed": "#1f1730",
                        "on-secondary-container": "#69607c",
                        "on-surface": "#1b1b21",
                        "error": "#ba1a1a",
                        "on-error": "#ffffff",
                        "surface-variant": "#e4e1e9",
                        "secondary-fixed-dim": "#cdc1e2",

                    fontFamily: {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]

                    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
                },
            },
        }

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface text-on-surface min-h-screen pb-20">
<!-- TopAppBar -->
<header class="w-full top-0 sticky z-50 bg-[#fbf8ff] dark:bg-slate-950 flex items-center h-14 px-4 transition-colors duration-200 active:scale-95">
<div class="flex items-center w-full max-w-2xl mx-auto">
<button class="mr-4 text-[#6547a4] dark:text-[#d2bcff] flex items-center justify-center">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-[#6547a4] dark:text-[#d2bcff] font-['Inter'] font-semibold text-lg tracking-tight">Personal Details</h1>
</div>
</header>
<main class="max-w-2xl mx-auto px-4 mt-6">
<!-- Profile Section -->
<div class="flex flex-col items-center mb-8">
<div class="relative group">
<div class="w-24 h-24 rounded-full bg-surface-container-high flex items-center justify-center overflow-hidden border-2 border-primary/10 shadow-sm">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="Close-up professional portrait of a woman with a neutral expression in a bright clinic setting with soft lavender lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDjZitlLF9-Qk0IRgL2ujt0HO7HZTeRxVEpoG4KugPDJ_xUMBBgEO5QgTeCMYLnNTXH7dNsfcs2ZKHzJlP6RVXg4AldMVYPrqxzZzlzBXGaExA2jA0x1ng8f1fLmMIdLQm8oxIDzdKkhHzgu6Lov4Baq3yokAgyRDvm7rzi9FWhUMv1LLhUKEuayFwQdnLpn4d0fkqJ-GSm-z9oBTLbd0HYwpIgADPJ40raX6V3O9Jh5U9UuplWX6haP2v03Q0TmFEpnxotBccLLiUR"/>
</div>
<button class="absolute bottom-0 right-0 bg-primary text-on-primary w-8 h-8 rounded-full flex items-center justify-center shadow-lg border-2 border-surface-container-lowest transition-transform hover:scale-105 active:scale-90">
<span class="material-symbols-outlined text-sm">edit</span>
</button>
</div>
</div>
<!-- Form Container -->
<div class="bg-surface-container-lowest rounded-xl p-6 shadow-[0px_4px_20px_rgba(126,96,191,0.06)] border border-outline-variant/15">
<form class="space-y-4">
<!-- Full Name -->
<div class="space-y-1">
<label class="text-[0.6875rem] font-semibold text-on-surface-variant uppercase tracking-wider pl-1">Full Name</label>
<div class="relative flex items-center">
<input class="w-full h-10 bg-surface-container-low border-none rounded-lg px-4 text-sm font-medium text-on-surface focus:ring-1 focus:ring-primary/20 focus:bg-surface-container transition-all" type="text" value="Dr. Elena Sterling"/>
</div>
</div>
<!-- Contact Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="space-y-1">
<label class="text-[0.6875rem] font-semibold text-on-surface-variant uppercase tracking-wider pl-1">Email Address</label>
<input class="w-full h-10 bg-surface-container-low border-none rounded-lg px-4 text-sm font-medium text-on-surface focus:ring-1 focus:ring-primary/20 focus:bg-surface-container transition-all" type="email" value="e.sterling@clinical.med"/>
</div>
<div class="space-y-1">
<label class="text-[0.6875rem] font-semibold text-on-surface-variant uppercase tracking-wider pl-1">Mobile Number</label>
<input class="w-full h-10 bg-surface-container-low border-none rounded-lg px-4 text-sm font-medium text-on-surface focus:ring-1 focus:ring-primary/20 focus:bg-surface-container transition-all" type="tel" value="+1 (555) 012-3456"/>
</div>
</div>
<!-- Full Address -->
<div class="space-y-1">
<label class="text-[0.6875rem] font-semibold text-on-surface-variant uppercase tracking-wider pl-1">Full Address</label>
<textarea class="w-full bg-surface-container-low border-none rounded-lg px-4 py-2 text-sm font-medium text-on-surface focus:ring-1 focus:ring-primary/20 focus:bg-surface-container transition-all resize-none" rows="2">1248 Medical Plaza, Suite 402, North District</textarea>
</div>
<!-- Location Grid -->
<div class="grid grid-cols-2 gap-4">
<div class="space-y-1">
<label class="text-[0.6875rem] font-semibold text-on-surface-variant uppercase tracking-wider pl-1">State</label>
<select class="w-full h-10 bg-surface-container-low border-none rounded-lg px-4 text-sm font-medium text-on-surface focus:ring-1 focus:ring-primary/20 focus:bg-surface-container transition-all appearance-none">
<option>California</option>
<option>New York</option>
<option>Texas</option>
</select>
</div>
<div class="space-y-1">
<label class="text-[0.6875rem] font-semibold text-on-surface-variant uppercase tracking-wider pl-1">Pincode</label>
<input class="w-full h-10 bg-surface-container-low border-none rounded-lg px-4 text-sm font-medium text-on-surface focus:ring-1 focus:ring-primary/20 focus:bg-surface-container transition-all" type="text" value="90210"/>
</div>
</div>
<!-- Action Button -->
<div class="pt-6">
<button class="w-full h-12 bg-gradient-to-r from-primary to-primary-container text-on-primary font-bold rounded-xl shadow-[0px_4px_12px_rgba(101,71,164,0.3)] hover:opacity-95 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="button"><span class="material-symbols-outlined text-lg">person_add</span>
                        Create Profile</button>
</div>
</form>
</div>
<!-- Informational Footer (Clinical Monolith Style) -->
</main>
<!-- BottomNavBar (Hidden on Mobile Search/Details but present for nav context if top level) -->
<!-- As per "Destination Rule", suppressed for details focus, but following JSON for shell structure if needed -->
</body></html>
